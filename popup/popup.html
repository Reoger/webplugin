<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PB Converter</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <span class="logo">PB Converter</span>
            <button class="settings-btn" id="settings-btn" title="设置">⚙️</button>
        </div>

        <!-- Settings Panel (hidden) -->
        <div class="settings-panel" id="settings-panel">
            <div class="settings-section">
                <div class="settings-label">工作模式</div>
                <div class="mode-toggle">
                    <button class="mode-opt active" data-mode="parse">解析 PB → JSON</button>
                    <button class="mode-opt" data-mode="encode">编码 JSON → PB</button>
                </div>
            </div>
            <div class="settings-section">
                <div class="settings-label">Schema 管理</div>
                <div class="settings-actions">
                    <button class="settings-action-btn" id="load-example-btn">📝 加载示例</button>
                    <button class="settings-action-btn" id="schema-manager-btn">📋 管理列表</button>
                </div>
            </div>
        </div>

        <!-- Schema Row -->
        <div class="schema-row">
            <span class="schema-label">Schema</span>
            <select id="schema-select" class="schema-select">
                <option value="">-- 选择 Schema --</option>
            </select>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-toolbar">
                <div class="format-pills">
                    <button class="format-pill active" data-format="hex">Hex</button>
                    <button class="format-pill" data-format="base64">Base64</button>
                    <button class="format-pill" data-format="binary">Binary</button>
                </div>
                <button class="upload-btn" id="upload-btn" title="上传文件">📁</button>
                <input type="file" id="file-input" class="file-input">
            </div>
            <textarea id="text-input" class="text-input" placeholder="粘贴 Hex / Base64 数据，或拖拽 .pb 文件到这里" rows="6"></textarea>
        </div>

        <!-- Action Button -->
        <div class="action-section">
            <button class="action-btn" id="process-btn" disabled>
                <span class="btn-icon">▶</span>
                <span class="btn-text">解析</span>
            </button>
        </div>

        <!-- Result Section -->
        <div class="result-section" id="result-section" style="display: none;">
            <div class="result-header">
                <span class="result-title" id="result-title">解析结果</span>
                <div class="result-actions">
                    <button class="result-action-btn" id="copy-result-btn" title="复制">📋</button>
                    <button class="result-action-btn" id="download-result-btn" title="下载">💾</button>
                </div>
            </div>
            <div class="result-content" id="result-content"></div>
        </div>
    </div>

    <!-- Schema Manager Modal -->
    <div class="modal" id="schema-manager-modal">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Schema 管理</h3>
                <button class="modal-close" id="close-modal-btn">✕</button>
            </div>
            <div class="modal-body">
                <div class="schema-list" id="schema-list">
                    <div class="empty-schema-list">暂无 Schema，点击下方加载示例开始</div>
                </div>
                <div class="modal-actions">
                    <button class="modal-action-btn primary" id="import-schema-btn">📥 导入</button>
                    <button class="modal-action-btn" id="export-schema-btn">📤 导出全部</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Scripts -->
    <script src="proto-wrapper.js"></script>
    <script src="popup.js"></script>
</body>
</html>
