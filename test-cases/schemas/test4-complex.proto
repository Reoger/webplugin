
syntax = "proto3";

package test;

enum Status {
  UNKNOWN = 0;
  PENDING = 1;
  APPROVED = 2;
  REJECTED = 3;
}

message OrderItem {
  int32 product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  float price = 4;
}

message ShippingInfo {
  string method = 1;
  string address = 2;
  float cost = 3;
}

message PaymentInfo {
  string method = 1;
  string transaction_id = 2;
  float amount = 3;
}

message Order {
  int32 order_id = 1;
  int64 timestamp = 2;
  Status status = 3;
  map<string, string> metadata = 4;
  repeated OrderItem items = 5;
  oneof delivery {
    ShippingInfo shipping = 6;
    bool pickup = 7;
  }
  PaymentInfo payment = 8;
}
